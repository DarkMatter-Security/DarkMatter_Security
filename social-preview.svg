    <line x1="0" y1="240" x2="1280" y2="240" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#00ff88" stroke-opacity="0.05" stroke-width="0.5"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="200" cy="320" r="200" fill="url(#glow1)" />
  <circle cx="1080" cy="320" r="200" fill="url(#glow1)" />

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent1)"/>

  <!-- ASCII Art Text - DARK MATTER -->
  <text x="640" y="160" font-family="'Courier New', monospace" font-size="20" fill="#00ff88" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">
    ██████  █████  ██████  ██   ██ ███    ███  █████  ████████ ███████ ██████
  </text>
  <text x="640" y="185" font-family="'Courier New', monospace" font-size="20" fill="#00ff88" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">
    ██   ██ ██   ██ ██   ██ ██  ██  ████  ████ ██   ██    ██    ██      ██   ██
  </text>
  <text x="640" y="210" font-family="'Courier New', monospace" font-size="20" fill="#00ff88" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">
    ██   ██ ███████ ██████  █████   ██ ████ ██ ███████    ██    █████   ██████
  </text>
  <text x="640" y="235" font-family="'Courier New', monospace" font-size="20" fill="#00ff88" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">
    ██   ██ ██   ██ ██   ██ ██  ██  ██  ██  ██ ██   ██    ██    ██      ██   ██
  </text>
  <text x="640" y="260" font-family="'Courier New', monospace" font-size="20" fill="#00ff88" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">
    ██████  ██   ██ ██   ██ ██   ██ ██      ██ ██   ██    ██    ███████ ██   ██
  </text>

  <!-- Main Title -->
  <text x="640" y="330" font-family="'Courier New', monospace" font-size="52" fill="#00ff88" text-anchor="middle" font-weight="bold" filter="url(#neonGlow)">
    DARK MATTER SECURITY
  </text>

  <!-- Tagline -->
  <text x="640" y="380" font-family="'Courier New', monospace" font-size="20" fill="#888899" text-anchor="middle" letter-spacing="6">
    INVISIBLE INFLUENCE . INDIRECT INTELLIGENCE
  </text>

  <!-- Subtitle -->
  <text x="640" y="430" font-family="'Courier New', monospace" font-size="18" fill="#00ccff" fill-opacity="0.6" text-anchor="middle" letter-spacing="3">
