  <rect x="40" y="40" width="2" height="30" fill="#00ff88" fill-opacity="0.4"/>
  <rect x="1240" y="40" width="2" height="30" fill="#00ccff" fill-opacity="0.4"/>
  <rect x="1210" y="40" width="30" height="2" fill="#00ccff" fill-opacity="0.4"/>
  <rect x="40" y="600" width="30" height="2" fill="#ff8800" fill-opacity="0.4"/>
  <rect x="40" y="570" width="2" height="30" fill="#ff8800" fill-opacity="0.4"/>
  <rect x="1240" y="570" width="2" height="30" fill="#ff8800" fill-opacity="0.4"/>
  <rect x="1210" y="600" width="30" height="2" fill="#ff8800" fill-opacity="0.4"/>

  <!-- Vertical accent lines -->
  <line x1="80" y1="80" x2="80" y2="560" stroke="#00ff88" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="1200" y1="80" x2="1200" y2="560" stroke="#00ccff" stroke-opacity="0.1" stroke-width="1"/>
</svg>
